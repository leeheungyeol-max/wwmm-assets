<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ww'mm Total Icon Set (Final)</title>
  <style>
    :root {
      --color-primary: #011C37;
      --color-accent: #caaa68;
      --color-surface-base: #FAFBFC;
      --color-surface-elevated: #FFFFFF;
      --color-outline: #E8ECEE;
    }
    body {
      background-color: var(--color-surface-base);
      font-family: 'NanumBarunGothic', sans-serif;
      color: var(--color-primary);
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin: 0 0 8px 0;
    }
    .section-title {
      width: 100%;
      max-width: 1000px;
      font-size: 14px;
      font-weight: 700;
      color: var(--color-accent);
      border-bottom: 1px solid var(--color-outline);
      padding-bottom: 10px;
      margin: 40px 0 20px 0;
      letter-spacing: 0.1em;
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1000px;
    }
    .icon-card {
      box-sizing: border-box;
      background-color: var(--color-surface-elevated);
      border: 1px solid var(--color-outline);
      border-radius: 0px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      aspect-ratio: 1 / 1;
    }
    .icon-card.dark-mode {
      background-color: var(--color-primary);
      border-color: var(--color-primary);
      border-radius: 50%;
    }
    .icon-label {
      margin-top: 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--color-primary);
      text-align: center;
    }
    .icon-card.dark-mode .icon-label {
      color: var(--color-accent);
    }
    svg {
      width: 32px;
      height: 32px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>ww'mm Total Icon Set</h1>
  </div>

  <div class="section-title">I. GNB NAVIGATION</div>
  <div class="icon-grid">
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 10l8-7 8 7v9.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 19.5V10z" />
        <path d="M9 21V12h6v9" />
      </svg>
      <div class="icon-label">HOME</div>
    </div>
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 21h10" />
        <path d="M12 21v-5" />
        <path d="M8 16h8" />
        <path d="M14 16v-6a4 4 0 0 0-4-4H7" />
        <rect x="5" y="3" width="4" height="3" />
        <path d="M7 6v4" />
        <path d="M5 10h4l1 3H4l1-3z" />
      </svg>
      <div class="icon-label">ATELIER</div>
    </div>
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="16" height="16" rx="2" />
        <circle cx="9" cy="9" r="2" />
        <path d="M20 14l-4-4-4 4-2-2-6 6" />
      </svg>
      <div class="icon-label">GALLERY</div>
    </div>
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 21v-5" />
        <path d="M6 16h6l4-5" />
        <path d="M6 16l-3 3" />
        <circle cx="17" cy="9.5" r="1.5" />
        <path d="M14 21V7a2 2 0 0 0-2-2H8" />
        <path d="M6 7h4" />
        <path d="M8 5v2" />
      </svg>
      <div class="icon-label">STUDIO</div>
    </div>
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 9v4a5 5 0 0 0 10 0V9" />
        <path d="M16 11h1a2 2 0 0 0 0-4h-1" />
        <path d="M4 18h14" />
        <path d="M9 5s-1 1 0 2 1 1 0 2" />
        <path d="M13 5s-1 1 0 2 1 1 0 2" />
      </svg>
      <div class="icon-label">CONCIERGE</div>
    </div>
  </div>

  <div class="section-title">II. UTILITY & CTA</div>
  <div class="icon-grid">
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <line x1="4" y1="6" x2="20" y2="6" />
        <line x1="4" y1="12" x2="20" y2="12" />
        <line x1="4" y1="18" x2="16" y2="18" />
      </svg>
      <div class="icon-label">MENU</div>
    </div>
    <div class="icon-card dark-mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" />
        <path d="M8 12.5l3 3 5-6" />
      </svg>
      <div class="icon-label">BOOKING</div>
    </div>
  </div>

  <div class="section-title">III. BRAND IDENTITY</div>
  <div class="icon-grid">
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 4v16" />
        <path d="M8 20h8" />
        <path d="M5 7h14" />
        <path d="M5 7l-3 7h6z" />
        <path d="M19 7l-3 7h6z" />
      </svg>
      <div class="icon-label">BALANCE</div>
    </div>
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="8" width="18" height="8" rx="2" />
        <path d="M7 8v3M11 8v5M15 8v3M19 8v2" />
      </svg>
      <div class="icon-label">PRECISION</div>
    </div>
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 18L14.5 9.5" />
        <path d="M14.5 9.5 C16 8, 19.5 7, 20 10 C20.5 13, 17 14, 16 12" />
        <path d="M8 16l-2 2M10 14l-2 2M12 12l-2 2" />
      </svg>
      <div class="icon-label">DENTISTRY</div>
    </div>
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="12" height="12" rx="1" />
        <rect x="6" y="6" width="12" height="12" rx="1" transform="rotate(45 12 12)" />
      </svg>
      <div class="icon-label">CHANGES</div>
    </div>
    <div class="icon-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 3h8a4 4 0 0 1 4 4v8a8 8 0 0 1-16 0V7a4 4 0 0 1 4-4z" />
        <path d="M4 11v4a8 8 0 0 0 8 8 8 8 0 0 0 8-8v-4" stroke="var(--color-accent)" />
      </svg>
      <div class="icon-label">VENEER</div>
    </div>
  </div>

</body>
</html>
